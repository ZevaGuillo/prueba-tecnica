spring:
  datasource:
    url: jdbc:h2:mem:reportes_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          create_namespaces: true
  kafka:
    consumer:
      group-id: ms-reportes-group-test
      auto-offset-reset: earliest

logging:
  level:
    root: WARN
    com.zevaguillo: INFO
